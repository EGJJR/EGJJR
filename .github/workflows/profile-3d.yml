name: GitHub-Profile-3D-Contrib

on:
  # 18:00 UTC daily — adjust to your local midnight if preferred
  schedule:
    - cron: "0 18 * * *"
  workflow_dispatch:

permissions:
  contents: write

# Prevent overlapping runs (manual + scheduled) from racing on the same branch
concurrency:
  group: profile-3d
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    name: generate-github-profile-3d-contrib
    steps:
      - uses: actions/checkout@v5

      # Pinned to v0.9.2 for reproducibility; swap to @latest if you prefer rolling updates
      - uses: yoshi389111/github-profile-3d-contrib@v0.9.2
        env:
          # Custom PAT (not the default GITHUB_TOKEN) so private-repo activity is counted.
          # Secret name must NOT start with GITHUB_.
          GITHUB_TOKEN: ${{ secrets.MY_PERSONAL_ACCESS_TOKEN }}
          USERNAME: ${{ github.repository_owner }}
          # Raise from default 100 in case of many repos
          MAX_REPOS: 200
          # Custom outputs (dual-mode + rainbow) on top of the stock SVGs
          SETTING_JSON: conf/profile-3d-settings.json

      - name: Commit & Push
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add -A .
          # Only commit if something actually changed — keeps history clean
          if git commit -m "chore: regenerate 3d profile contribs"; then
            git push
          fi
