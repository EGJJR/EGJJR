name: GitHub-Profile-3D-Contrib

on:
  # 18:00 UTC daily — adjust to your local midnight if preferred
  schedule:
    - cron: "0 18 * * *"
  workflow_dispatch:

permissions:
  contents: write

# Prevent overlapping runs (manual + scheduled) from racing on the same branch
concurrency:
  group: profile-3d
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    name: generate-activity-chart
    steps:
      # Always operate on main — profile page reads SVGs from main, so we pin
      # the target branch even if the default branch (currently `develop`) changes.
      - uses: actions/checkout@v5
        with:
          ref: main

      # Node 20 ships built-in fetch — no install step, no node_modules.
      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      # Custom isometric 26-week chart (scripts/activity-chart/generate.mjs).
      # Outputs profile-3d-contrib/activity-{light,dark}.svg.
      - name: Generate activity chart
        env:
          # Custom PAT (not the default GITHUB_TOKEN) so private-repo activity is counted.
          # Secret name must NOT start with GITHUB_.
          GITHUB_TOKEN: ${{ secrets.MY_PERSONAL_ACCESS_TOKEN }}
          USERNAME: ${{ github.repository_owner }}
          WEEKS: "26"
        run: node scripts/activity-chart/generate.mjs

      - name: Commit & Push
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add -A .
          # Only commit if something actually changed — keeps history clean
          if git commit -m "chore: regenerate activity chart"; then
            # Explicit ref because checkout used ref: main (detached HEAD otherwise)
            git push origin HEAD:main
          fi
